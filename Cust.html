  <script>
    $(document).ready(function () {
      showPageLoading('讀取個案', '正在獲取執行中與封存名單...');
      // 頁面載入時，抓取所有初始資料
      loadInitialData();

      // 顯示當前使用者
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);

      // ==================== 事件處理 ====================
      $('#inputCustBirth').on('change', function () {
        updateAgeDisplay($(this).val());
      });

      // 查詢按鈕事件
      $('#btnQuery').click(function () {
        const selectedName = $('#selectCustName').val();
        if (!selectedName) {
          Swal.fire('提示', '請先選擇一位個案', 'warning');
          return;
        }
        
        const allCustData = JSON.parse(sessionStorage.getItem('custData'));
        const customer = allCustData.find(c => c.Cust_N === selectedName);

        if (customer) {
          populateForm(customer);
          $('#sourceSheet').val('Cust'); // 標記出處
          switchToDetailMode('update');
        } else {
          Swal.fire('錯誤', '在快取中找不到該個案資料，請嘗試重新整理頁面。', 'error');
        }
      });

      // 查詢封存中個案按鈕事件
      $('#btnQueryOld').click(function () {
        const selectedName = $('#selectOldCustName').val();
        if (!selectedName) {
          Swal.fire('提示', '請先選擇一位封存個案', 'warning');
          return;
        }

        const allOldCustData = JSON.parse(sessionStorage.getItem('oldCustData'));
        const customer = allOldCustData.find(c => c.Cust_N === selectedName);

        if (customer) {
          populateForm(customer);
          $('#sourceSheet').val('OldCust'); // 標記出處
          switchToDetailMode('queryOld');
        } else {
          Swal.fire('錯誤', '在快取中找不到該個案資料，請嘗試重新整理頁面。', 'error');
        }
      });

      // 新增按鈕事件 (初始畫面)
      $('#btnAddInit').click(function () {
        // 彈出對話框詢問新個案姓名
        Swal.fire({
          title: '請輸入新個案姓名',
          input: 'text',
          showCancelButton: true,
          confirmButtonText: '確定',
          cancelButtonText: '取消',
          inputValidator: (value) => {
            if (!value) {
              return '姓名不能為空！';
            }
          }
        }).then((result) => {
          if (result.isConfirmed) {
            const newName = result.value;
            // 清空表單並填入姓名
            clearForm();
            $('#displayCustName').text(newName);
            $('#inputCustName').val(newName);
            $('#sourceSheet').val('Cust');
            switchToDetailMode('add');
          }
        });
      });

      // 儲存/更新按鈕事件
      $('#btnSave').click(function () {
        const mode = $('#formMode').val();
        const formData = {
          // 從 input 欄位收集資料
          custName: $('#inputCustName').val(),
          custSex: $('#inputCustSex').val(),
          custBirth: $('#inputCustBirth').val(),
          custAddr: $('#inputCustAddr').val(),
          supName: $('#inputSupName').val(),
          dsupName: $('#inputDSupName').val(),
          supTel: $('#inputSupTel').val(),
          officeTel: $('#inputOfficeTel').val(),
          ecName: $('#inputEcName').val(),
          ecTel: $('#inputEcTel').val(),
          custltcCode: $('#inputcustLtcCode').val(),
          ltcCode: $('#inputLtcCode').val(),
          formUrl: $('#inputFormUrl').val()
        };

        if (!formData.custBirth) {
          Swal.fire('提示', '請輸入生日', 'warning');
          return;
        }

        const sheetName = $('#sourceSheet').val();

        // --- Client-side Duplicate Check (New) ---
        if (mode === 'add') {
          const active = JSON.parse(sessionStorage.getItem('custData')) || [];
          const archived = JSON.parse(sessionStorage.getItem('oldCustData')) || [];
          // Check if name exists in either list
          if (active.some(c => c.Cust_N === formData.custName) || archived.some(c => c.Cust_N === formData.custName)) {
            Swal.fire('錯誤', '該個案姓名已存在 (包含封存名單)！', 'error');
            return;
          }
        }

        // --- 1. Optimistic Update (Session & UI) ---
        updateSessionAndUI(mode, formData, sheetName);

        // --- 2. Background Server Sync ---
        const action = (mode === 'add') ? 'addCustData' : 'updateCustData';
        const serverCall = (mode === 'add') 
          ? google.script.run.addCustData(formData)
          : google.script.run.updateCustData(formData, sheetName);

        // Attach handlers to the runner (Note: GAS client-side syntax usually requires chaining handlers before the function call)
        // Correct pattern: google.script.run.withSuccessHandler(...).func(...)
        
        if (mode === 'add') {
             google.script.run.withSuccessHandler(function(res) {
                 if (!res.success) {
                     console.error('Background sync failed:', res.message);
                     Swal.fire('同步失敗', '伺服器同步失敗: ' + res.message, 'error');
                 } else {
                     console.log('Background sync success (Add)');
                 }
             }).withFailureHandler(function(err) {
                 console.error('Server error:', err);
                 Swal.fire('同步錯誤', '伺服器連線錯誤: ' + err.message, 'error');
             }).addCustData(formData);
        } else {
             google.script.run.withSuccessHandler(function(res) {
                 if (!res.success) {
                     console.error('Background sync failed:', res.message);
                     Swal.fire('同步失敗', '伺服器同步失敗: ' + res.message, 'error');
                 } else {
                     console.log('Background sync success (Update)');
                 }
             }).withFailureHandler(function(err) {
                 console.error('Server error:', err);
                 Swal.fire('同步錯誤', '伺服器連線錯誤: ' + err.message, 'error');
             }).updateCustData(formData, sheetName);
        }
      });

      // 封存按鈕 (搜尋頁)
      $('#btnArchive').click(function() {
        const custName = $('#selectCustName').val();
        if (!custName) return Swal.fire('提示', '請選擇要封存的個案', 'warning');
        handleMoveCustomer(custName, 'Cust', 'OldCust');
      });

      // 解封按鈕 (搜尋頁)
      $('#btnUnarchive').click(function() {
        const custName = $('#selectOldCustName').val();
        if (!custName) return Swal.fire('提示', '請選擇要解封的個案', 'warning');
        handleMoveCustomer(custName, 'OldCust', 'Cust');
      });

      // 封存按鈕 (詳情頁)
      $('#btnDetailArchive').click(function() {
        const custName = $('#inputCustName').val();
        handleMoveCustomer(custName, 'Cust', 'OldCust', true); // true 表示在詳情頁操作
      });

      // 解封按鈕 (詳情頁)
      $('#btnDetailUnarchive').click(function() {
        const custName = $('#inputCustName').val();
        handleMoveCustomer(custName, 'OldCust', 'Cust', true); // true 表示在詳情頁操作
      });

      // 刪除按鈕事件
      $('#btnDelete').click(function () {
        const custName = $('#selectOldCustName').val();
        if (!custName) return Swal.fire('提示', '請選擇要刪除的封存個案', 'warning');
        handleDeleteCustomer(custName, 'OldCust');
      });

      // 刪除按鈕 (詳情頁)
      $('#btnDetailDelete').click(function() {
        const custName = $('#inputCustName').val();
        handleDeleteCustomer(custName, 'OldCust', true); // true 表示在詳情頁操作
      });

      $('#btnBack').click(function () {
        backToSearch(false);
      });
    });

    // ==================== 資料處理函式 ====================

    // 處理個案移動 (封存/解封)
    function handleMoveCustomer(custName, fromSheet, toSheet, fromDetail = false) {
      const actionText = fromSheet === 'Cust' ? '封存' : '解封';
      Swal.fire({
        title: `確定要${actionText}個案 "${custName}" 嗎?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確定',
        cancelButtonText: '取消'
      }).then((result) => {
        if (result.isConfirmed) {
          // --- 1. 立即在 Session 中執行 ---
          const fromStorageKey = fromSheet === 'Cust' ? 'custData' : 'oldCustData';
          const toStorageKey = toSheet === 'Cust' ? 'custData' : 'oldCustData';

          let fromArray = JSON.parse(sessionStorage.getItem(fromStorageKey)) || [];
          let toArray = JSON.parse(sessionStorage.getItem(toStorageKey)) || [];

          const customerIndex = fromArray.findIndex(c => c.Cust_N === custName);
          if (customerIndex === -1) {
            Swal.fire({ title: '錯誤', text: '在快取中找不到要移動的個案資料。', icon: 'error' });
            return;
          }

          // 從來源陣列移除並取得該個案
          const [customerToMove] = fromArray.splice(customerIndex, 1);

          // 加入到目標陣列並排序
          toArray.push(customerToMove);
          toArray.sort((a, b) => a.Cust_N.localeCompare(b.Cust_N));

          // 更新 sessionStorage
          sessionStorage.setItem(fromStorageKey, JSON.stringify(fromArray));
          sessionStorage.setItem(toStorageKey, JSON.stringify(toArray));

          // --- 2. 立即更新 UI ---
          Swal.fire({
            title: '成功',
            text: `個案 "${custName}" 已${actionText}！正在背景同步資料...`,
            icon: 'success',
            timer: 1500,
            showConfirmButton: false
          });

          if (fromDetail) {
            backToSearch(false); // 從詳情頁返回，不強制重載
          } else {
            populateDropdowns(); // 在搜尋頁，僅重整下拉選單
          }

          // --- 3. 非同步在背景執行伺服器端操作 ---
          google.script.run
            .withSuccessHandler(function(res) {
              if (res.success) {
                console.log(`背景同步成功: ${res.message}`);
              } else {
                console.error(`背景同步失敗: ${res.message}`);
                Swal.fire({
                  title: '背景同步失敗',
                  text: `您的操作已在介面上完成，但與伺服器同步時發生錯誤: ${res.message}。建議您重新整理頁面以確保資料一致。`,
                  icon: 'error'
                });
              }
            })
            .withFailureHandler(function(error) {
              console.error(`背景同步失敗 (伺服器錯誤): ${error.message}`);
              Swal.fire({
                title: '背景同步失敗',
                text: `您的操作已在介面上完成，但與伺服器連線時發生嚴重錯誤: ${error.message}。建議您重新整理頁面以確保資料一致。`,
                icon: 'error'
              });
            })
            .moveCustomer(custName, fromSheet, toSheet);
        }
      });
    }

    // 處理刪除
    function handleDeleteCustomer(custName, sheetName, fromDetail = false) {
        Swal.fire({
          title: '確定刪除?',
          text: `將刪除個案：${custName} 的所有資料，此動作無法復原！`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: '是的，刪除',
          cancelButtonText: '取消'
        }).then((result) => {
          if (result.isConfirmed) {
            // --- 1. 立即在 Session 中執行 ---
            const storageKey = 'oldCustData'; // 刪除操作只針對封存個案
            let dataArray = JSON.parse(sessionStorage.getItem(storageKey)) || [];

            const customerIndex = dataArray.findIndex(c => c.Cust_N === custName);
            if (customerIndex === -1) {
              Swal.fire({ title: '錯誤', text: '在快取中找不到要刪除的個案資料。', icon: 'error' });
              return;
            }

            // 從陣列中移除該個案
            dataArray.splice(customerIndex, 1);

            // 更新 sessionStorage
            sessionStorage.setItem(storageKey, JSON.stringify(dataArray));

            // --- 2. 立即更新 UI ---
            Swal.fire({
              title: '成功',
              text: `個案 "${custName}" 已刪除！正在背景同步資料...`,
              icon: 'success',
              timer: 1500,
              showConfirmButton: false
            });

            if (fromDetail) {
              backToSearch(false); // 從詳情頁返回，不強制重載
            } else {
              populateDropdowns(); // 在搜尋頁，僅重整下拉選單
            }

            // --- 3. 非同步在背景執行伺服器端操作 ---
            google.script.run
              .withSuccessHandler(function(res) {
                if (res.success) {
                  console.log(`背景同步成功: ${res.message}`);
                } else {
                  console.error(`背景同步失敗: ${res.message}`);
                  Swal.fire({
                    title: '背景同步失敗',
                    text: `您的操作已在介面上完成，但與伺服器同步時發生錯誤: ${res.message}。建議您重新整理頁面以確保資料一致。`,
                    icon: 'error'
                  });
                }
              })
              .withFailureHandler(function(error) {
                console.error(`背景同步失敗 (伺服器錯誤): ${error.message}`);
                Swal.fire({
                  title: '背景同步失敗',
                  text: `您的操作已在介面上完成，但與伺服器連線時發生嚴重錯誤: ${error.message}。建議您重新整理頁面以確保資料一致。`,
                  icon: 'error'
                });
              })
              .deleteCustData(custName, sheetName);
          }
        });
    }

    // 載入所有初始資料到 sessionStorage
    function loadInitialData() {
      // 已由 ready 處呼叫 showPageLoading
      google.script.run
        .withSuccessHandler(function (data) {
          sessionStorage.setItem('custData', JSON.stringify(data.active));
          sessionStorage.setItem('oldCustData', JSON.stringify(data.archived));
          populateDropdowns();
          Swal.close();
        })
        .withFailureHandler(function (error) {
          Swal.close();
          Swal.fire('載入失敗', '無法取得個案清單：' + error.message, 'error');
          $('#selectCustName').empty().append('<option value="" disabled selected>載入失敗</option>');
          $('#selectOldCustName').empty().append('<option value="" disabled selected>載入失敗</option>');
        })
        .getAllCustData();
    }

    // 從 sessionStorage 填充下拉選單
    function populateDropdowns() {
      try {
        const data = {
          active: JSON.parse(sessionStorage.getItem('custData')) || [],
          archived: JSON.parse(sessionStorage.getItem('oldCustData')) || []
        };
        
        // 1. 填入 #selectCustName (執行中)
        const select = $('#selectCustName');
        select.empty();
        select.append('<option value="" disabled selected>請選擇個案...</option>');
        if (data.active.length === 0) {
          select.append('<option value="" disabled>無資料</option>');
        } else {
          data.active.forEach(function (customer) {
            select.append(`<option value="${customer.Cust_N}">${customer.Cust_N}</option>`);
          });
        }

        // 2. 填入 #selectOldCustName (封存中)
        const selectOld = $('#selectOldCustName');
        selectOld.empty();
        selectOld.append('<option value="" disabled selected>請選擇封存個案...</option>');
        if (data.archived.length === 0) {
          selectOld.append('<option value="" disabled>無資料</option>');
        } else {
          data.archived.forEach(function (customer) {
            selectOld.append(`<option value="${customer.Cust_N}">${customer.Cust_N}</option>`);
          });
        }
      } catch (e) {
        console.error("填充下拉選單失敗:", e);
        Swal.fire('錯誤', '讀取快取資料失敗，請重新整理。', 'error');
      }
    }

    // 更新 Session 並回饋 UI (新增與更新通用)
    function updateSessionAndUI(mode, formData, sheetName) {
      // 如果是新增，預設存入 custData (Active)
      const storageKey = (sheetName === 'Cust' || mode === 'add') ? 'custData' : 'oldCustData';
      let dataArray = JSON.parse(sessionStorage.getItem(storageKey)) || [];
      
      // 將前端表單資料 (formData) 轉換為後端資料結構 (Sheet 欄位)
      const newRecord = {
          Cust_N: formData.custName,
          Cust_Sex: formData.custSex,
          Cust_BD: formData.custBirth,
          Cust_Add: formData.custAddr,
          Sup_N: formData.supName,
          DSup_N: formData.dsupName,
          Sup_Tel: formData.supTel,
          Office_Tel: formData.officeTel,
          Cust_EC: formData.ecName,
          Cust_EC_Tel: formData.ecTel,
          Cust_LTC_Code: formData.custltcCode,
          LTC_Code: formData.ltcCode,
          Form_Url: formData.formUrl
      };

      if (mode === 'add') {
          dataArray.push(newRecord);
          // 簡單排序 (依姓名)
          dataArray.sort((a, b) => a.Cust_N.localeCompare(b.Cust_N));
      } else {
          const index = dataArray.findIndex(c => c.Cust_N === formData.custName);
          if (index !== -1) {
              dataArray[index] = { ...dataArray[index], ...newRecord };
          }
      }
      
      sessionStorage.setItem(storageKey, JSON.stringify(dataArray));
      
      Swal.fire({
        icon: 'success',
        title: '成功',
        text: (mode === 'add' ? '新增' : '更新') + '成功 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch(false); // false = 不重新從伺服器載入
    }

    // ==================== UI 控制函式 ====================

    // 切換到詳情/編輯模式
    function switchToDetailMode(mode) {
      $('#searchSection').hide(); // 隱藏查詢區塊 
      $('#detailSection').show(); // 顯示編輯區塊 
      $('#formMode').val(mode);

      // Hide all buttons first to ensure a clean state
      $('#btnSave, #btnDetailArchive, #btnDetailUnarchive, #btnDetailDelete').hide();

      if (mode === 'add') {
        $('#btnSave').html('<i class="fas fa-save"></i> 新增資料').show();
      } else if (mode === 'update') { // For active customer query
        $('#btnSave').html('<i class="fas fa-sync"></i> 更新資料').show();
        $('#btnDetailArchive').show();
      } else if (mode === 'queryOld') { // For archived customer query
        $('#btnSave').html('<i class="fas fa-sync"></i> 更新資料').show(); // 允許編輯封存資料
        $('#btnDetailUnarchive').show();
        $('#btnDetailDelete').show();
      }
    }

    // 填入表單資料
    function populateForm(data) {
      $('#displayCustName').text(data.Cust_N); // 以標籤顯示 
      $('#inputCustName').val(data.Cust_N);
      $('#inputCustSex').val(data.Cust_Sex);
      $('#inputCustBirth').val(data.Cust_BD || '');
      // 填入資料後立即計算年齡
      updateAgeDisplay(data.Cust_BD);
      $('#inputCustAddr').val(data.Cust_Add || '');
      $('#inputSupName').val(data.Sup_N || '');
      $('#inputDSupName').val(data.DSup_N || '');
      $('#inputSupTel').val(data.Sup_Tel || '');
      $('#inputOfficeTel').val(data.Office_Tel || '');
      $('#inputEcName').val(data.Cust_EC || '');
      $('#inputEcTel').val(data.Cust_EC_Tel || '');
      $('#inputcustLtcCode').val(data.Cust_LTC_Code || '');
      $('#inputLtcCode').val(data.LTC_Code || '');
      $('#inputFormUrl').val(data.Form_Url || '');
    }

    // 清空表單
    function clearForm() {
      $('#custForm')[0].reset();
      $('#displayCustName').text('');
      $('#inputCustName').val('');
    }

    // ==================== 輔助函式 ====================
    // 計算年齡的函式
    function calculateAge(birthDateString) {
      if (!birthDateString) return "--";
      const today = new Date();
      const birthDate = new Date(birthDateString);
      let age = today.getFullYear() - birthDate.getFullYear();
      const m = today.getMonth() - birthDate.getMonth();
      // 如果今天日期還沒到生日的月份，或到了月份但還沒到當天，年齡減 1
      if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
      }
      return age >= 0 ? age : 0;
    }

    // 更新畫面上的年齡顯示
    function updateAgeDisplay(birthDate) {
      const age = calculateAge(birthDate);
      $('#displayAge').text(`年齡：${age} 歲`);
    }

    // 回到查詢初始狀態
    function backToSearch(forceReload) {
      $('#detailSection').hide();   // 隱藏詳細資料表單
      $('#searchSection').show();   // 顯示查詢與新增區塊
      clearForm();                  // 清空表單內容
      if (forceReload) {
        loadInitialData(); // 從伺服器重新載入所有資料
      } else {
        populateDropdowns(); // 僅從快取重新整理下拉選單
      }
    }

  </script>
