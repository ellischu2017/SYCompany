<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>開啟試算表 - 個案管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    .container {
      max-width: 800px;
      margin-top: 20px;
      margin-bottom: 50px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div id="loadingSpin" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <nav class="navbar navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-primary" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">快速開啟試算表</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">系統導航</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container">
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3"><i class="fas fa-server"></i> 系統試算表</h5>

        <div class="input-group mb-3">
          <select class="form-select" id="queryMainSheet">
            <option value="" disabled selected>載入中...</option>
          </select>
          <button class="btn btn-primary" type="button" onclick="openSelected('queryMainSheet')">
            <i class="fas fa-external-link-alt"></i> 開啟
          </button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3"><i class="fas fa-folder-open"></i> 年度檔案</h5>

        <div class="mb-3">
          <label for="queryYear" class="form-label">選擇年份：</label>
          <select class="form-select" id="queryYear">
            <!-- 由 JS 動態產生 -->
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">紀錄表 (RecUrl)：</label>
          <div class="input-group">
            <select class="form-select" id="queryRecSheet"></select>
            <button class="btn btn-outline-primary" type="button" onclick="openSelected('queryRecSheet')">開啟</button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">報表 (ReportsUrl)：</label>
          <div class="input-group">
            <select class="form-select" id="queryReportsSheet"></select>
            <button class="btn btn-outline-primary" type="button" onclick="openSelected('queryReportsSheet')">開啟</button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">PDF 報表 (PdfUrl)：</label>
          <div class="input-group">
            <select class="form-select" id="queryPdf"></select>
            <button class="btn btn-outline-primary" type="button" onclick="openSelected('queryPdf')">開啟</button>
          </div>
        </div>

      </div>
    </div>

    <div class="container mt-2 text-end">
      <small class="text-muted">
        <i class="fas fa-user-circle"></i> 當前管理員：
        <span id="currentUserDisplay"></span>
      </small>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 儲存後端回傳的所有資料
    let cachedData = {
      main: [],
      rec: [],
      reports: [],
      pdfs: []
    };

    $(document).ready(function () {
      // 顯示當前使用者
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);
      loadAllData();

      // 綁定年份變更事件
      $('#queryYear').change(function () {
        updateYearlyOptions($(this).val());
      });
    });

    /**
     * 從後端一次抓取所有資料
     */
    function loadAllData() {
      $('#loadingSpin').css('display', 'flex');

      google.script.run.withSuccessHandler(function (data) {
        cachedData = data;
        initSystemSheets();
        initYearSelect();
        $('#loadingSpin').hide();
      }).getOpenSheetData();
    }

    function initSystemSheets() {
      const select = $('#queryMainSheet');
      select.empty();
      if (cachedData.main && cachedData.main.length > 0) {
        cachedData.main.forEach(item => {
          select.append(`<option value="${item.url}">${item.name}</option>`);
        });
      } else {
        select.append('<option value="" disabled>無可用檔案</option>');
      }
    }

    function initYearSelect() {
      const select = $('#queryYear');
      select.empty();
      const currentYear = new Date().getFullYear();
      const startYear = 2025;

      for (let y = startYear; y <= currentYear; y++) {
        select.append(`<option value="${y}">${y}年</option>`);
      }
      // 預設選中目前年份
      select.val(currentYear);
      updateYearlyOptions(currentYear);
    }

    function updateYearlyOptions(year) {
      // 根據年份篩選並更新下拉選單
      // RecUrl: 包含 SYyyyy
      populateSelect('#queryRecSheet', cachedData.rec, 'SY' + year);
      // ReportsUrl: 包含 RPyyyy (修正為 RP 以符合現有命名規則)
      populateSelect('#queryReportsSheet', cachedData.reports, 'RP' + year);
      // PdfUrl: 包含 PDyyyy
      populateSelect('#queryPdf', cachedData.pdfs, 'PD' + year);
    }

    function populateSelect(selector, sourceData, searchStr) {
      const select = $(selector);
      select.empty();
      
      const filtered = sourceData.filter(item => item.name.indexOf(searchStr) !== -1);
      
      if (filtered.length === 0) {
        select.append('<option value="" disabled selected>無相關檔案</option>');
      } else {
        select.append('<option value="" disabled selected>--- 請選擇 ---</option>');
        filtered.forEach(item => {
          select.append(`<option value="${item.url}">${item.name}</option>`);
        });
        // 若只有一個選項則自動選取
        if (filtered.length === 1) {
          select.val(filtered[0].url);
        }
      }
    }

    function openSelected(elementId) {
      const url = $('#' + elementId).val();
      if (url) {
        window.open(url, '_blank');
      } else {
        Swal.fire('提示', '請先選擇一個檔案', 'warning');
      }
    }
  </script>
</body>
<?!= includeFooter(); ?>

</html>
