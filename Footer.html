<style>
  .footer-section {
    margin-top: 50px;
    padding: 20px 0;
    text-align: center;
    border-top: 1px solid #dee2e6;
    color: #6c757d;
  }

  .footer-section a {
    color: #dc3545;
    text-decoration: none;
    font-weight: bold;
  }

  .footer-section a:hover {
    text-decoration: underline;
  }
</style>

<footer class="footer-section">
  <div class="container">
    <p>
      <i class="fas fa-comment-dots"></i>
      對系統有任何建議嗎？
      <a id="pageSuggest" onclick="openPageUrl('Suggest','_blank');" class="btn btn-danger text-white">提交意見</a>
    </p>
    <small>&copy; 2026 舒漾居家長照服務管理系統</small>
  </div>
</footer>

<script>
  /**
        * 呼叫後端同步權限功能
        */
  function syncPermissions() {
    // 檢查 Swal 是否存在，避免再次報錯
    if (typeof Swal === 'undefined') {
      alert("系統錯誤：尚未載入 SweetAlert2 函式庫");
      return;
    }

    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector('.offcanvas');
    if (offcanvasElement) {
      var offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (offcanvas) offcanvas.hide();
    }

    // 2. 啟動 SweetAlert2 動態效果
    Swal.fire({
      title: '同步權限中',
      text: '正在更新所有試算表權限，並清理名單，請稍候...',
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    // 3. 呼叫 GAS 後端
    google.script.run
      .withSuccessHandler(function () {
        Swal.fire({
          icon: 'success',
          title: '同步完成',
          text: '權限已成功更新',
          timer: 2000
        });
      })
      .withFailureHandler(function (err) {
        Swal.fire({
          icon: 'error',
          title: '同步失敗',
          text: err.message
        });
      })
      .syncMasterTablePermissions();
  }

  function runManualMaintenance() {
    // 1. 關閉導航列
    var offcanvasElement = document.querySelector('.offcanvas');
    var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
    if (bsOffcanvas) bsOffcanvas.hide();

    // 2. 顯示讀取中
    Swal.fire({
      title: '資料處理中',
      text: '正在遷移過期紀錄並同步 User 名單...',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    // 3. 呼叫後端函式
    google.script.run
      .withSuccessHandler(function () {
        Swal.fire('完成', '資料維護與 User 同步已執行完畢。', 'success');
      })
      .withFailureHandler(function (err) {
        Swal.fire('執行失敗', err.message, 'error');
      })
      .dailyMaintenanceJob(); // 執行剛才寫的後端主函式
  }

  function ChangePage(pageName) {
    // 1. 關閉導航列
    var offcanvasElement = document.querySelector('.offcanvas');
    var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
    if (bsOffcanvas) bsOffcanvas.hide();

    // 2. 顯示讀取中
    Swal.fire({
      title: '轉換中',
      text: '頁面正在轉換中，請稍候...',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

  }

  /**
   * 清除快取功能
   */
  function clearCache() {
    // 1. 關閉導航列
    var offcanvasElement = document.querySelector('.offcanvas');
    if (offcanvasElement) {
      var offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (offcanvas) offcanvas.hide();
    }
    
    Swal.fire({
      title: '清除快取',
      text: '確定要清除系統快取與前端暫存嗎？頁面將會重新整理。',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '確定清除',
      cancelButtonText: '取消'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: '處理中...',
          text: '正在清除伺服器快取與本地暫存...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });
        
        google.script.run
          .withSuccessHandler(function() {
            sessionStorage.clear(); // 清除前端 SessionStorage
            Swal.fire({
              icon: 'success',
              title: '完成',
              text: '快取已清除，正在重新整理...',
              timer: 1000,
              showConfirmButton: false
            }).then(() => {
              window.top.location.href = SCRIPT_URL;
            });
          })
          .withFailureHandler(function(err) {
            Swal.fire('錯誤', err.message, 'error');
          })
          .clearAllCaches();
      }
    });
  }

  // 使用 var 並檢查變數是否存在，以避免在 Auth.html 等頁面中發生重複宣告的錯誤
  if (typeof SCRIPT_URL === 'undefined') {
    var SCRIPT_URL = "<?!= getScriptUrl() ?>";
  }
  function openPageUrl(pageName, target = "_top") {
    //網址
    if (target === "_blank") {
      window.open(SCRIPT_URL + "?page=" + pageName, target);
    } else {
      window.top.location.href = SCRIPT_URL + "?page=" + pageName;
    }
  }

  /**
   * 登出系統，清除本地儲存並導向登入頁
   */
  function logout() {
    // 1. 關閉可能開啟的 Offcanvas 導覽列
    var offcanvasElement = document.querySelector('.offcanvas');
    if (offcanvasElement) {
      var offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (offcanvas) offcanvas.hide();
    }

    // 2. 跳轉到登入頁面，並帶上 logout 參數以觸發清除動作
    window.top.location.href = SCRIPT_URL + "?page=Auth&logout=true";
  }

  // 全域權限檢查：限制 Role='user' 只能訪問特定頁面
  $(document).ready(function() {
    try {
      var loginData = JSON.parse(localStorage.getItem('Login'));
      // 若角色為 user
      if (loginData && loginData.User && loginData.Role === 'user') {
        var urlParams = new URLSearchParams(window.location.search);
        var currentPage = urlParams.get('page');
        
        // 白名單：僅允許 SR_server01 和 Auth
        // 注意：若 currentPage 為 null (通常是首頁)，後端 doGet 會處理，這裡主要攔截明確指定 page 的參數
        var allowedPages = ['SR_server01', 'Auth'];
        
        if (currentPage && allowedPages.indexOf(currentPage) === -1) {
           Swal.fire({
             icon: 'warning',
             title: '權限受限',
             text: '您的帳號 (User) 僅能存取電子服務紀錄(用戶端)。',
             confirmButtonText: '前往正確頁面',
             allowOutsideClick: false,
             allowEscapeKey: false
           }).then(function() {
            openPageUrl('SR_server01','_top');                        
           });
        }
      }
    } catch (e) {
      console.error("權限檢查例外:", e);
    }
  });
</script>
