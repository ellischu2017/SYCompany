<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>網址管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    .container {
      max-width: 600px;
      margin-top: 20px;
    }

    .hidden-section {
      display: none;
    }

    .url-label {
      font-weight: bold;
      font-size: 1.2rem;
      color: #6c757d;
      padding: 5px 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-secondary sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-secondary" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">紀錄單網址管理</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5>系統導航</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container">
    <div id="searchSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">服務紀錄單網址查詢</h5>
        <div class="mb-3">
          <select class="form-select" id="selectSYName">
            <option value="" disabled selected>載入中...</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary flex-grow-1" id="btnQuery"><i class="fas fa-edit"></i> 修改</button>
          <button class="btn btn-outline-success flex-grow-1" id="btnAddInit"><i class="fas fa-plus"></i> 新增</button>
          <button class="btn btn-outline-danger flex-grow-1" id="btnDeleteFromSearch"><i class="fas fa-trash"></i> 刪除</button>
        </div>
      </div>
    </div>

    <div id="detailSection" class="card shadow-sm hidden-section">
      <div class="card-body">
        <form id="urlForm">
          <input type="hidden" id="formMode" value="update">
          <div class="mb-3">
            <label class="form-label">服務紀錄單代碼 (SY_N)</label>
            <div id="displaySYName" class="url-label"></div>
            <input type="hidden" id="inputSYName">
          </div>
          <div class="mb-3">
            <label for="inputRecUrl" class="form-label">服務紀錄單網址 (SY_Url)</label>
            <textarea class="form-control" id="inputRecUrl" rows="4" placeholder="請貼上 Google 表單或紀錄單連結"></textarea>
          </div>
          <div class="d-flex gap-3 justify-content-center mt-2">
            <button type="button" class="btn btn-outline-secondary flex-grow-1" id="btnSave"><i class="fas fa-save"></i>
              儲存資料</button>
            <button type="button" class="btn btn-outline-danger flex-grow-1" id="btnDelete"><i class="fas fa-trash"></i>
              刪除</button>
            <button type="button" class="btn btn-outline-dark flex-grow-1" id="btnBack" onclick="backToSearch()"><i
                class="fas fa-undo-alt"></i> 返回搜尋</button>
          </div>
        </form>
      </div>
    </div>
    <div class="container mt-2 text-end">
      <small class="text-muted">
        <i class="fas fa-user-circle"></i> 當前管理員：
        <span id="currentUserDisplay"></span>
      </small>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    $(document).ready(function () {
      showPageLoading('讀取網址', '正在載入紀錄單連結資訊...');
      // 顯示當前使用者
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);
      loadInitialData();

      // 查詢按鈕
      $('#btnQuery').click(function () {
        const name = $('#selectSYName').val();
        if (!name) return Swal.fire('提示', '服務紀錄單代碼', 'warning');
        
        const list = JSON.parse(sessionStorage.getItem('recUrlData')) || [];
        const item = list.find(r => r.SY_N === name);

        if (item) {
          $('#displaySYName').text(item.SY_N);
          $('#inputSYName').val(item.SY_N);
          $('#inputRecUrl').val(item.SY_Url);
          switchToDetailMode('update');
        } else {
          Swal.fire('錯誤', '找不到該資料，請重新整理頁面', 'error');
        }
      });

      // 新增初始按鈕 (彈出視窗輸入姓名)
      $('#btnAddInit').click(function () {
        Swal.fire({
          title: '輸入新服務紀錄單代碼',
          input: 'text',
          showCancelButton: true
        }).then((result) => {
          if (result.isConfirmed && result.value) {
            // 前端檢查重複
            const list = JSON.parse(sessionStorage.getItem('recUrlData')) || [];
            if (list.some(r => r.SY_N === result.value)) {
              Swal.fire('錯誤', '該代碼已存在', 'error');
              return;
            }

            $('#urlForm')[0].reset();
            $('#displaySYName').text(result.value);
            $('#inputSYName').val(result.value);
            switchToDetailMode('add');
          }
        });
      });

      // 儲存按鈕 (不論新增或更新都調用 saveRecUrlData)
      $('#btnSave').click(function () {
        const mode = $('#formMode').val();
        const data = {
          syName: $('#inputSYName').val(),
          recUrl: $('#inputRecUrl').val()
        };
        if (!data.recUrl) return Swal.fire('提示', '請輸入網址', 'warning');

        // 1. 更新 Session 與 UI (立即反應)
        updateSessionAndUI(mode, data);

        // 2. 背景同步
        google.script.run.withSuccessHandler(function (res) {
          if (!res.success) {
            console.error('背景同步失敗:', res.message);
            Swal.fire('同步失敗', res.message, 'error');
          } else {
            console.log('背景同步成功');
          }
        }).withFailureHandler(function(err){
            console.error('背景同步錯誤:', err);
        }).saveRecUrlData(data);
      });

      // 刪除按鈕
      $('#btnDelete').click(function () {
        const name = $('#inputSYName').val();
        confirmAndDelete(name);
      });

      // 從搜尋頁刪除
      $('#btnDeleteFromSearch').click(function () {
        const name = $('#selectSYName').val();
        if (!name) return Swal.fire('提示', '請選擇要刪除的項目', 'warning');
        confirmAndDelete(name);
      });

      function confirmAndDelete(name) {
        Swal.fire({
          title: '確定要刪除?',
          text: `將刪除 ${name} 的資料，此動作無法復原！`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33'
        }).then((result) => {
          if (result.isConfirmed) {
            // 1. 更新 Session 與 UI (立即反應)
            deleteFromSessionAndUI(name);

            // 2. 背景同步
            google.script.run.withSuccessHandler(function (res) {
              if (!res.success) {
                 Swal.fire('同步失敗', res.message, 'error');
              } else {
                 console.log('背景刪除成功');
              }
            }).withFailureHandler(function(err){
                console.error('背景同步錯誤:', err);
            }).deleteRecUrlData(name);
          }
        });
      }
    });

    function loadInitialData() {
      google.script.run.withSuccessHandler(function (data) {
        sessionStorage.setItem('recUrlData', JSON.stringify(data));
        populateDropdown();
        Swal.close();
      }).withFailureHandler(function(err){
        Swal.close();
        Swal.fire('載入失敗', err.message, 'error');
      }).getAllRecUrlData();
    }

    function populateDropdown() {
      const list = JSON.parse(sessionStorage.getItem('recUrlData')) || [];
        const select = $('#selectSYName');
        select.empty().append('<option value="" disabled selected>請選擇代碼...</option>');
        list.forEach(item => select.append(`<option value="${item.SY_N}">${item.SY_N}</option>`));
    }

    function updateSessionAndUI(mode, data) {
      let list = JSON.parse(sessionStorage.getItem('recUrlData')) || [];
      
      if (mode === 'add') {
        list.push({ SY_N: data.syName, SY_Url: data.recUrl });
        // 簡單排序
        list.sort((a, b) => a.SY_N.localeCompare(b.SY_N));
      } else {
        const idx = list.findIndex(r => r.SY_N === data.syName);
        if (idx !== -1) {
          list[idx].SY_Url = data.recUrl;
        }
      }
      
      sessionStorage.setItem('recUrlData', JSON.stringify(list));
      
      Swal.fire({
        icon: 'success',
        title: '成功',
        text: (mode === 'add' ? '新增' : '更新') + '成功 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function deleteFromSessionAndUI(name) {
      let list = JSON.parse(sessionStorage.getItem('recUrlData')) || [];
      list = list.filter(r => r.SY_N !== name);
      sessionStorage.setItem('recUrlData', JSON.stringify(list));
      
      Swal.fire({
        icon: 'success',
        title: '已刪除',
        text: '資料已刪除 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function switchToDetailMode(mode) {
      $('#searchSection').hide();
      $('#detailSection').show();
      $('#formMode').val(mode);
      if (mode === 'add') $('#btnDelete').hide(); else $('#btnDelete').show();
    }

    function backToSearch() {
      $('#detailSection').hide();
      $('#searchSection').show();
      populateDropdown();
    }

  </script>
</body>
<?!= includeFooter(); ?>

</html>
