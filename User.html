<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>居服員管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    .container {
      max-width: 600px;
      margin-top: 20px;
    }

    .hidden-section {
      display: none;
    }

    .user-label {
      font-weight: bold;
      font-size: 1.2rem;
      color: #198754;
      padding: 5px 0;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div id="loading" class="loading-overlay">
    <div class="spinner-border text-success" role="status"></div>
  </div>

  <nav class="navbar navbar-dark bg-success sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-success" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">居服員管理系統</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5>系統導航</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container">
    <div id="searchSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">居服員選擇</h5>
        <div class="mb-3">
          <select class="form-select" id="selectUserName">
            <option value="" disabled selected>載入中...</option>
          </select>
        </div>
        <div class="d-flex gap-3">
          <button class="btn btn-primary flex-grow-1" id="btnQuery"><i class="fas fa-edit"></i> 修改</button>
          <button class="btn btn-success flex-grow-1" id="btnAddInit"><i class="fas fa-plus"></i> 新增</button>
          <button class="btn btn-danger flex-grow-1" id="btnDeleteFromSearch"><i class="fas fa-trash"></i> 刪除</button>
        </div>
      </div>
    </div>

    <div id="detailSection" class="card shadow-sm hidden-section">
      <div class="card-body">
        <form id="userForm">
          <input type="hidden" id="formMode" value="update">
          <div class="mb-3">
            <label class="form-label">居服員姓名 (User_N)</label>
            <div id="displayUserName" class="user-label"></div>
            <input type="hidden" id="inputUserName">
          </div>
          <div class="mb-3">
            <label class="form-label">Email (User_Email)</label>
            <input type="email" class="form-control" id="inputUserEmail">
          </div>
          <div class="mb-3">
            <label class="form-label">電話 (User_Tel)</label>
            <input type="text" class="form-control" id="inputUserTel" placeholder="0900000000">
          </div>
          <div class="d-flex gap-3 mt-4">
            <button type="button" class="btn btn-success flex-grow-1" id="btnSave"><i class="fas fa-save"></i> 更新資料</button>
            <button type="button" class="btn btn-danger flex-grow-1" id="btnDelete"><i class="fas fa-trash"></i> 刪除</button>
            <button type="button" class="btn btn-secondary flex-grow-1" id="btnBack" onclick="backToSearch()">返回搜尋</button>
          </div>
        </form>
      </div>
    </div>
    <div class="container mt-2 text-end">
      <small class="text-muted">
        <i class="fas fa-user-circle"></i> 當前管理員：
        <?= userEmail ?>
      </small>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    $(document).ready(function () {
      $('#loading').css('display', 'flex');
      // 1. 載入初始資料
      loadInitialData();

      // 2. 查詢按鈕 (改為讀取 Session)
      $('#btnQuery').click(function () {
        const name = $('#selectUserName').val();
        if (!name) return Swal.fire('提示', '請選擇居服員', 'warning');
        
        const users = JSON.parse(sessionStorage.getItem('userData')) || [];
        const user = users.find(u => u.User_N === name);
        
        if (user) {
          $('#displayUserName').text(user.User_N);
          $('#inputUserName').val(user.User_N);
          $('#inputUserEmail').val(user.User_Email);
          $('#inputUserTel').val(user.User_Tel);
          switchToDetailMode('update');
        } else {
          Swal.fire('錯誤', '找不到該居服員資料，請重新整理頁面', 'error');
        }
      });

      // 3. 新增按鈕
      $('#btnAddInit').click(function () {
        Swal.fire({
          title: '輸入新居服員姓名',
          input: 'text',
          showCancelButton: true,
          inputValidator: (value) => {
            if (!value) return '請輸入姓名';
          }
        }).then((result) => {
          if (result.isConfirmed && result.value) {
            // 前端檢查重複
            const users = JSON.parse(sessionStorage.getItem('userData')) || [];
            if (users.some(u => u.User_N === result.value)) {
              Swal.fire('錯誤', '該居服員姓名已存在', 'error');
              return;
            }

            $('#userForm')[0].reset();
            $('#displayUserName').text(result.value);
            $('#inputUserName').val(result.value);
            switchToDetailMode('add');
          }
        });
      });

      // 4. 儲存按鈕 (新增/更新)
      $('#btnSave').click(function () {
        const mode = $('#formMode').val();
        const data = {
          userName: $('#inputUserName').val(),
          userEmail: $('#inputUserEmail').val(),
          userTel: $('#inputUserTel').val()
        };

        if (!data.userName) return Swal.fire('提示', '姓名不能為空', 'warning');

        // 立即更新 UI & Session
        updateSessionAndUI(mode, data);

        // 背景同步
        const action = (mode === 'add') ? 'addUserData' : 'updateUserData';
        google.script.run.withSuccessHandler(function (res) {
          if (!res.success) {
            Swal.fire('同步失敗', res.message + ' 請重新整理頁面。', 'error');
          } else {
            console.log('背景同步成功:', res.message);
          }
        }).withFailureHandler(function(err){
             Swal.fire('同步錯誤', err.message, 'error');
        })[action](data);
      });

      // 5. 刪除按鈕
      $('#btnDelete').click(function () {
        const name = $('#inputUserName').val();
        Swal.fire({
          title: '確定刪除?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33'
        }).then((result) => {
          if (result.isConfirmed) {
            // 立即更新 UI & Session
            deleteFromSessionAndUI(name);

            // 背景同步
            google.script.run.withSuccessHandler(function (res) {
               if (!res.success) {
                 Swal.fire('同步失敗', res.message, 'error');
               } else {
                 console.log('背景刪除成功');
               }
            }).withFailureHandler(function(err){
               Swal.fire('同步錯誤', err.message, 'error');
            }).deleteUserData(name);
          }
        });
      });

      // 6. 從搜尋頁直接刪除
      $('#btnDeleteFromSearch').click(function () {
        const name = $('#selectUserName').val();
        if (!name) return Swal.fire('提示', '請選擇要刪除的居服員', 'warning');

        Swal.fire({
          title: '確定要刪除此居服員?',
          text: `您確定要刪除「${name}」嗎？此動作無法復原！`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: '是的，刪除！',
          cancelButtonText: '取消'
        }).then((result) => {
          if (result.isConfirmed) {
            // 立即更新 UI & Session
            deleteFromSessionAndUI(name);

            // 背景同步
            google.script.run.withSuccessHandler(function (res) {
              if (!res.success) {
                Swal.fire('同步失敗', res.message, 'error');
              } else {
                console.log('背景刪除成功');
              }
            }).withFailureHandler(function (err) {
              Swal.fire('同步錯誤', err.message, 'error');
            }).deleteUserData(name);
          }
        });
      });
    });

    function loadInitialData() {
      google.script.run.withSuccessHandler(function (data) {
        sessionStorage.setItem('userData', JSON.stringify(data));
        populateDropdown();
        $('#loading').hide();
      }).withFailureHandler(function(err){
        $('#loading').hide();
        Swal.fire('載入失敗', err.message, 'error');
      }).getAllUserData();
    }

    function populateDropdown() {
      const users = JSON.parse(sessionStorage.getItem('userData')) || [];
      const select = $('#selectUserName');
      select.empty().append('<option value="" disabled selected>請選擇居服員...</option>');
      users.forEach(u => select.append(`<option value="${u.User_N}">${u.User_N}</option>`));
    }

    function updateSessionAndUI(mode, data) {
      let users = JSON.parse(sessionStorage.getItem('userData')) || [];
      
      if (mode === 'add') {
        users.push({
          User_N: data.userName,
          User_Email: data.userEmail,
          User_Tel: data.userTel
        });
        // 排序
        users.sort((a, b) => a.User_N.localeCompare(b.User_N));
      } else {
        const idx = users.findIndex(u => u.User_N === data.userName);
        if (idx !== -1) {
          users[idx].User_Email = data.userEmail;
          users[idx].User_Tel = data.userTel;
        }
      }
      
      sessionStorage.setItem('userData', JSON.stringify(users));
      
      Swal.fire({
        icon: 'success',
        title: '成功',
        text: mode === 'add' ? '新增成功 (背景同步中)' : '更新成功 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function deleteFromSessionAndUI(name) {
      let users = JSON.parse(sessionStorage.getItem('userData')) || [];
      users = users.filter(u => u.User_N !== name);
      sessionStorage.setItem('userData', JSON.stringify(users));
      
      Swal.fire({
        icon: 'success',
        title: '已刪除',
        text: '資料已刪除 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function switchToDetailMode(mode) {
      $('#searchSection').hide();
      $('#detailSection').show();
      $('#formMode').val(mode);
      $('#btnSave').text(mode === 'add' ? '新增資料' : '更新資料');
      if (mode === 'add') $('#btnDelete').hide(); else $('#btnDelete').show();
    }

    function backToSearch() {
      $('#detailSection').hide();
      $('#searchSection').show();
      populateDropdown();
    }

  </script>
</body>
<?!= includeFooter(); ?>

</html>
