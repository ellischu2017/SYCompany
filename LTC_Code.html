<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>長照編碼管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    .container {
      max-width: 600px;
      margin-top: 20px;
    }

    .hidden-section {
      display: none;
    }

    .code-label {
      font-weight: bold;
      font-size: 1.2rem;
      color: #0dcaf0;
      padding: 5px 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-info sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-info" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">長照編碼管理系統</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5>系統導航</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container">
    <div id="searchSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">服務編碼選擇 (SR_ID)</h5>
        <div class="mb-3">
          <select class="form-select" id="selectSrId">
            <option value="" disabled selected>載入中...</option>
          </select>
        </div>
        <div class="d-flex gap-3">
          <button class="btn btn-outline-primary flex-grow-1" id="btnQuery"><i class="fas fa-edit"></i> 修改</button>
          <button class="btn btn-outline-success flex-grow-1" id="btnAddInit"><i class="fas fa-plus"></i> 新增</button>
          <button class="btn btn-outline-danger flex-grow-1" id="btnDeleteFromSearch"><i class="fas fa-trash"></i> 刪除</button>
        </div>
      </div>
    </div>

    <div id="detailSection" class="card shadow-sm hidden-section ">
      <div class="card-body">
        <form id="ltcForm">
          <input type="hidden" id="formMode" value="update">

          <div class="mb-3">
            <label class="form-label">服務編碼 (SR_ID)</label>
            <div id="displaySrId" class="code-label"></div>
            <input type="hidden" id="inputSrId">
          </div>

          <div class="mb-3">
            <label class="form-label">服務項目名稱 (SR_Name)</label>
            <textarea class="form-control" id="inputSrName" rows="5" placeholder="例如：家務及日常生活照顧服務"></textarea>
          </div>

          <div class="mb-3">
            <label for="inputSrDetail" class="form-label">服務內容詳細說明 (SR_Detail)</label>
            <textarea class="form-control" id="inputSrDetail" rows="10" placeholder="請輸入詳細服務內容..."></textarea>
          </div>

          <div class="d-flex gap-3 mt-4">
            <button type="button" class="btn btn-info text-white flex-grow-1 " id="btnSave"><i class="fas fa-save"></i> 更新資料</button>
            <button type="button" class="btn btn-danger flex-grow-1" id="btnDelete"><i class="fas fa-trash"></i> 刪除</button>
            <button type="button" class="btn btn-secondary flex-grow-1" id="btnBack" onclick="backToSearch()"><i class="fas fa-undo"></i> 返回搜尋</button>
          </div>
        </form>
      </div>
    </div>
    <div class="container mt-2 text-end">
      <small class="text-muted">
        <i class="fas fa-user-circle"></i> 當前管理員：
        <span id="currentUserDisplay"></span>
      </small>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    $(document).ready(function () {
      showPageLoading('載入編碼', '正在讀取長照服務代碼...');
      // 顯示當前使用者
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);
      // 1. 載入初始資料到 Session
      loadInitialData();

      // 2. 查詢 (改為讀取 Session)
      $('#btnQuery').click(function () {
        const srId = $('#selectSrId').val();
        if (!srId) return Swal.fire('提示', '請選擇服務編碼', 'warning');
        
        const ltcList = JSON.parse(sessionStorage.getItem('ltcData')) || [];
        const item = ltcList.find(r => r.SR_ID === srId);

        if (item) {
          $('#displaySrId').text(item.SR_ID);
          $('#inputSrId').val(item.SR_ID);
          $('#inputSrName').val(item.SR_Name);
          $('#inputSrDetail').val(item.SR_Detail);
          switchToDetailMode('update');
        } else {
          Swal.fire('錯誤', '找不到該編碼資料，請重新整理頁面', 'error');
        }
      });

      // 3. 新增初始
      $('#btnAddInit').click(function () {
        Swal.fire({
          title: '輸入新服務編碼 (SR_ID)',
          text: '例如：BA01',
          input: 'text',
          showCancelButton: true
        }).then((result) => {
          if (result.isConfirmed && result.value) {
            // 前端檢查重複
            const ltcList = JSON.parse(sessionStorage.getItem('ltcData')) || [];
            if (ltcList.some(r => r.SR_ID === result.value)) {
              Swal.fire('錯誤', '該服務編碼已存在', 'error');
              return;
            }

            $('#ltcForm')[0].reset();
            $('#displaySrId').text(result.value);
            $('#inputSrId').val(result.value);
            switchToDetailMode('add');
          }
        });
      });

      // 5. 從搜尋頁直接刪除 (背景處理)
      $('#btnDeleteFromSearch').click(function () {
        const srId = $('#selectSrId').val();
        if (!srId) return Swal.fire('提示', '請選擇要刪除的服務編碼', 'warning');

        Swal.fire({
          title: '確定要刪除此編碼?',
          text: `您確定要刪除「${srId}」嗎？此動作無法復原！`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: '是的，刪除它！',
          cancelButtonText: '取消'
        }).then((result) => {
          if (result.isConfirmed) {
            // 立即更新 UI & Session
            deleteFromSessionAndUI(srId);

            // 背景同步
            google.script.run.withSuccessHandler(function (res) {
               if (!res.success) {
                 Swal.fire('同步失敗', res.message, 'error');
               } else {
                 console.log('背景刪除成功');
               }
            }).withFailureHandler(function(err){
               Swal.fire('同步錯誤', err.message, 'error');
            }).deleteLtcCodeData(srId);
          }
        });
      });

      // 4. 儲存與更新 (背景處理)
      $('#btnSave').click(function () {
        const mode = $('#formMode').val();
        const data = {
          srId: $('#inputSrId').val(),
          srName: $('#inputSrName').val(),
          srDetail: $('#inputSrDetail').val()
        };
        if (!data.srName) return Swal.fire('提示', '請輸入服務項目名稱', 'warning');

        // 立即更新 UI & Session
        updateSessionAndUI(mode, data);

        // 背景同步
        const action = (mode === 'add') ? 'addLtcCodeData' : 'updateLtcCodeData';
        google.script.run.withSuccessHandler(function (res) {
          if (!res.success) {
            Swal.fire('同步失敗', res.message + ' 請重新整理頁面。', 'error');
          } else {
            console.log('背景同步成功:', res.message);
          }
        }).withFailureHandler(function(err){
             Swal.fire('同步錯誤', err.message, 'error');
        })[action](data);
      });

      // 6. 從詳情頁刪除 (背景處理)
      $('#btnDelete').click(function () {
        const srId = $('#inputSrId').val();
        Swal.fire({
          title: '確定要刪除此編碼?',
          text: "此動作無法復原！(背景同步中)",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33'
        }).then((result) => {
          if (result.isConfirmed) {
            // 立即更新 UI & Session
            deleteFromSessionAndUI(srId);

            // 背景同步
            google.script.run.withSuccessHandler(function (res) {
               if (!res.success) {
                 Swal.fire('同步失敗', res.message, 'error');
               } else {
                 console.log('背景刪除成功');
               }
            }).withFailureHandler(function(err){
               Swal.fire('同步錯誤', err.message, 'error');
            }).deleteLtcCodeData(srId);
          }
        });
      });
    });

    function loadInitialData() {
      google.script.run.withSuccessHandler(function (data) {
        sessionStorage.setItem('ltcData', JSON.stringify(data));
        populateDropdown();
        Swal.close();
      }).withFailureHandler(function(err){
        Swal.close();
        Swal.fire('載入失敗', err.message, 'error');
      }).getAllLtcCodeData();
    }

    function populateDropdown() {
      const ltcList = JSON.parse(sessionStorage.getItem('ltcData')) || [];
      const select = $('#selectSrId');
      select.empty().append('<option value="" disabled selected>請選擇服務編碼...</option>');
      ltcList.forEach(item => select.append(`<option value="${item.SR_ID}">${item.SR_ID}</option>`));
    }

    function updateSessionAndUI(mode, data) {
      let ltcList = JSON.parse(sessionStorage.getItem('ltcData')) || [];
      
      if (mode === 'add') {
        ltcList.push({
          SR_ID: data.srId,
          SR_Name: data.srName,
          SR_Detail: data.srDetail
        });
        // 簡單排序
        ltcList.sort((a, b) => a.SR_ID.localeCompare(b.SR_ID));
      } else {
        const idx = ltcList.findIndex(r => r.SR_ID === data.srId);
        if (idx !== -1) {
          ltcList[idx].SR_Name = data.srName;
          ltcList[idx].SR_Detail = data.srDetail;
        }
      }
      
      sessionStorage.setItem('ltcData', JSON.stringify(ltcList));
      
      Swal.fire({
        icon: 'success',
        title: '成功',
        text: (mode === 'add' ? '新增' : '更新') + '成功 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function deleteFromSessionAndUI(srId) {
      let ltcList = JSON.parse(sessionStorage.getItem('ltcData')) || [];
      ltcList = ltcList.filter(r => r.SR_ID !== srId);
      sessionStorage.setItem('ltcData', JSON.stringify(ltcList));
      
      Swal.fire({
        icon: 'success',
        title: '已刪除',
        text: '資料已刪除 (背景同步中)',
        timer: 1500,
        showConfirmButton: false
      });
      
      backToSearch();
    }

    function switchToDetailMode(mode) {
      $('#searchSection').hide();
      $('#detailSection').show();
      $('#formMode').val(mode);
      $('#btnSave').text(mode === 'add' ? '確認新增' : '更新資料');
      if (mode === 'add') $('#btnDelete').hide(); else $('#btnDelete').show();
    }

    function backToSearch() {
      $('#detailSection').hide();
      $('#searchSection').show();
      populateDropdown();
    }

  </script>
</body>
<?!= includeFooter(); ?>

</html>
