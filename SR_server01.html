<!DOCTYPE html>
<html>

<head>
  <base target="_top" />
  <title>舒漾電子服務紀錄管理(用戶端)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <style>
    body {
      background-color: #fff5f5;
      font-family: "Microsoft JhengHei", sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      margin: auto;
    }

    #loadingSpin {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .label-value {
      font-weight: bold;
      color: #d63384;
      font-size: 1.1rem;
      padding: 5px 10px;
      background: #f8f9fa;
      border-radius: 5px;
      display: inline-block;
      min-width: 100px;
    }

    .hidden-section {
      display: none;
    }

    .section-title {
      border-left: 5px solid #dc3545;
      padding-left: 10px;
      margin-bottom: 20px;
      color: #dc3545;
    }

    /* 自定義 Select2 紅色主題 (覆寫 Bootstrap 5 主題預設藍色) */
    .select2-container--bootstrap-5.select2-container--focus .select2-selection,
    .select2-container--bootstrap-5 .select2-selection:focus {
      border-color: #dc3545;
      box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
    }

    /* 下拉選單中，滑鼠指到的項目 (Highlighted) */
    .select2-container--bootstrap-5 .select2-dropdown .select2-results__option--highlighted[aria-selected] {
      background-color: #dc3545;
      color: #fff;
    }

    /* 已被選取的項目 (Selected) */
    .select2-container--bootstrap-5 .select2-results__option--selected {
      background-color: #bb2d3b;
      color: #fff;
    }

    /* 新增：當其他個案被啟用時的視覺提示 (紅色邊框與陰影) */
    .highlight-select2+.select2-container .select2-selection {
      border: 2px solid #dc3545 !important;
      box-shadow: 0 0 10px rgba(220, 53, 69, 0.2);
    }
  </style>
</head>

<body>
  <div id="loadingSpin" class="loading">
    <div class="spinner-border text-danger"></div>
  </div>

  <div class="container">
    <h2 class="text-center text-danger mb-4">舒漾電子服務紀錄管理(用戶端)</h2>

    <div id="searchSection">
      <h5 class="section-title">查詢條件</h5>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">日期 (Date)</label>
          <input type="date" class="form-control" id="queryDate" />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">入場別 (SRTimes)</label>
          <select class="form-select" id="querySRTimes">
            <option value="1" selected>第一次</option>
            <option value="2">第二次</option>
            <option value="3">第三次</option>
            <option value="4">第四次</option>
            <option value="5">第五次</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">居服員姓名 (User_N)</label>
          <select class="form-select" id="queryUserN">
            <option value="" disabled selected>系統載入中...</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">個案姓名 (Cust_N)</label>
          <select class="form-select" id="queryCustN">
            <option value="" disabled selected>請先選擇居服員...</option>
          </select>
        </div>
      </div>
      <div class="row" id="otherCustRow">
        <div class="col-md-12 mb-3">
          <label class="form-label">其他個案名單 (若常用名單無此個案，請由在此選擇)</label>
          <select class="form-select" id="queryCustNOther" disabled>
            <option value="" selected>-- 請先從上方選擇「其他」 --</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">服務編碼 (Pay_Type)</label>
          <select class="form-select" id="queryPType">
            <option value="補助" selected>補助</option>
            <option value="自費">自費</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">服務編碼 (SR_ID)</label>
          <select class="form-select" id="querySrId">
            <option value="" disabled selected>請先選擇個案...</option>
          </select>
        </div>
      </div>

      <div class="d-grid gap-2 mt-3">
        <button class="btn btn-danger btn-lg" id="btnQuery">
          查詢紀錄
        </button>
        <button class="btn btn-outline-secondary btn-lg" id="btnLogout">
          <i class="fas fa-sign-out-alt me-2"></i>更換使用者 / 登出
        </button>
      </div>
    </div>

    <div id="detailSection" class="hidden-section mt-4 border-top pt-4">
      <h5 class="section-title">紀錄內容</h5>
      <div class="row mb-3">
        <div class="col-12">
          <span id="labQuery" class="label-value fs-6" style="color:#cdb5f8;"></span>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">服務紀錄內容 (SR_REC)</label>
        <textarea class="form-control" id="inputSrRec" rows="4" placeholder="請詳細輸入服務內容..."></textarea>
        <div class="mt-2 d-flex justify-content-between align-items-center">
          <small id="charCount" class="text-muted fw-bold">字數：0</small>
          <div class="btn-group shadow-sm" role="group">
            <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="handleClipboard('cut', '#inputSrRec')">
              <i class="fa-solid fa-scissors"></i> 剪下
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="handleClipboard('copy', '#inputSrRec')">
              <i class="fa-regular fa-copy"></i> 複製
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="handleClipboard('paste', '#inputSrRec')">
              <i class="fa-solid fa-paste"></i> 貼上
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="handleClipboard('addAI', '#inputSrRec')">
              <i class="fa-solid fa-wand-magic-sparkles"></i> AI
            </button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">意識狀況 (LOC)</label>
          <select class="form-select" id="inputLoc">
            <option value="清醒">清醒</option>
            <option value="混亂">混亂</option>
            <option value="木僵">木僵</option>
            <option value="嗜睡">嗜睡</option>
            <option value="昏迷">昏迷</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">身心狀況 (Mood)</label>
          <select class="form-select" id="inputMood">
            <option value="穩定">穩定</option>
            <option value="不穩定">不穩定</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">特殊狀況說明及處理 (SPCONS)</label>
          <textarea class="form-control" id="inputSpcons" rows="2"></textarea>
        </div>
      </div>
      <div class="d-grid gap-2">
        <button class="btn btn-primary btn-lg" id="btnUpdate">
          更新紀錄
        </button>
        <button class="btn btn-success btn-lg" id="btnAdd">
          確認存檔
        </button>
        <button class="btn btn-secondary btn-lg" id="btnBack">
          返回查詢
        </button>
      </div>
    </div>
  </div>



  <script>
    // --- 全域變數：模擬 Session ---
    let GLOBAL_DATA = {
      users: [],      // SYCompany > User + SYTemp > User
      custs: [],      // SYCompany > Cust
      ltcCodes: [],   // SYCompany > LTC_Code
      srData: [],
      srDataHeaders: [],
      currentUser: null
    };
    const CACHE_KEY = "SRServer01_InitData";

    $(document).ready(function () {
      checkLocalStorageAuth();

      $('#loadingSpin').css('display', 'flex').show();

      const today = new Date();
      const dayOfMonth = today.getDate();

      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };
      $("#queryDate").val(formatDate(today));

      let minDate;
      if (dayOfMonth <= 10) {
        minDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      } else {
        minDate = new Date(today.getFullYear(), today.getMonth(), 1);
      }
      $("#queryDate").attr("min", formatDate(minDate));
      $("#queryDate").attr("max", formatDate(today));

      // 初始化：優先檢查 Session Storage 快取
      const cachedData = sessionStorage.getItem(CACHE_KEY);
      if (cachedData) {
        console.log("從 sessionStorage 載入資料");
        initSuccess(JSON.parse(cachedData));
      } else {
        google.script.run
          .withSuccessHandler(function (data) {
            try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) { console.error("Cache write failed", e); }
            initSuccess(data);
          })
          .withFailureHandler(function (err) {
            $("#loadingSpin").hide();
            Swal.fire("系統錯誤", "初始化失敗：" + err.message, "error");
          })
          .getSRServer01InitData();
      }

      // --- 綁定事件監聽 ---
      // 改用 select2:select 與 change 雙重監聽，確保各種操作都能觸發
      $("#queryUserN").on('select2:select change', function () {
        const selectedUserName = $(this).val();
        updateCustSelect(selectedUserName);
      });

      $("#queryCustN").change(function () {
        if ($(this).val() === "其他") {
          $("#otherCustRow").show();
          $("#queryCustNOther").prop("disabled", false).addClass("highlight-select2");
          // 自動捲動並開啟下拉選單 (跳轉焦點)
          $("#otherCustRow")[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          setTimeout(() => { $("#queryCustNOther").select2('open'); }, 100);
        } else {
          $("#otherCustRow").hide();
          // 切換回一般個案時，清空並鎖定其他個案選單，移除視覺提示
          $("#queryCustNOther").prop("disabled", true).removeClass("highlight-select2").val(null).trigger('change');
          updateSrIdSelect($(this).val());
        }
      });

      $("#queryCustNOther").change(function () {
        updateSrIdSelect($(this).val());
      });

      $("#btnQuery").click(async function () {
        $("#loadingSpin").css('display', 'flex');
        // 移除 disabled 邏輯，改由 loadingSpin 遮罩阻擋重複點擊，避免手機版按鈕卡死
        const success = await handleAction("query");
      });

      $("#btnLogout").click(function () {
        Swal.fire({
          title: '確認登出',
          text: "是否確定要登出系統並更換使用者？",
          icon: 'question',
          showCancelButton: true,
          confirmButtonText: '登出',
          cancelButtonText: '取消'
        }).then((result) => {
          if (result.isConfirmed) {
            localStorage.removeItem('Login');
            sessionStorage.removeItem('Login');
            sessionStorage.removeItem(CACHE_KEY);
            window.top.location.href = "<?!= getScriptUrl() ?>?page=Auth&logout=true";
          }
        });
      });

      $("#btnAdd").click(async function () {
        $('#btnAdd').prop('disabled', true);
        $("#loadingSpin").css('display', 'flex');
        // 新增成功後會切換回查詢頁面，故不需重新啟用按鈕(防止連點)
        const success = await handleAction("add");
        if (!success) $('#btnAdd').prop('disabled', false);
      });

      $("#btnUpdate").click(async function () {
        $('#btnUpdate').prop('disabled', true);
        $("#loadingSpin").css('display', 'flex');
        // 更新成功後會切換回查詢頁面，故不需重新啟用按鈕
        const success = await handleAction("update");
        if (!success) $('#btnUpdate').prop('disabled', false);
      });

      $("#btnBack").click(function () {
        backToSearch();
      });

      // 新增：字數統計功能
      $('#inputSrRec').on('input', function () {
        const len = $(this).val().length;
        const $count = $('#charCount');
        $count.text(`字數：${len}`);
        if (len > 100) {
          $count.removeClass('text-muted').addClass('text-danger');
        } else {
          $count.removeClass('text-danger').addClass('text-muted');
        }
      });
    });

    function checkLocalStorageAuth() {
      let loginData;
      try {
        loginData = JSON.parse(localStorage.getItem('Login'));
      } catch (e) {
        loginData = null;
      }

      if (!loginData || !loginData.User || !loginData.Role) {
        // 如果沒有 localStorage 登入資訊，則導向 Auth.html
        window.top.location.href = "<?!= getScriptUrl() ?>";
      }
    }

    // --- 初始化成功回調 ---
    function initSuccess(data) {
      $("#loadingSpin").hide();

      GLOBAL_DATA.users = data.users;
      GLOBAL_DATA.custs = data.custs;
      GLOBAL_DATA.ltcCodes = data.ltcCodes;
      if (data.srData && data.srData.length > 0) {
        GLOBAL_DATA.srDataHeaders = data.srData[0];
        // The rest is data.
        GLOBAL_DATA.srData = data.srData.slice(1);
      }

      // 設定當前使用者 (從 LocalStorage)
      const loginData = JSON.parse(localStorage.getItem('Login'));
      const loggedInUser = loginData ? loginData.User : null;
      const loggedInRole = loginData ? loginData.Role : null;

      const $userSelect = $("#queryUserN");
      $userSelect.empty();
      $userSelect.append('<option></option>'); // Select2 Placeholder

      // 填入所有 User 到下拉選單 (這裡已包含從 Temp 更新過的名單)
      GLOBAL_DATA.users.forEach(u => {
        $userSelect.append(`<option value="${u.name}">${u.name}</option>`);
      });

      // 初始化 User Select2
      $userSelect.select2({
        theme: 'bootstrap-5',
        width: '100%',
        placeholder: '請輸入名字搜尋居服員...',
        allowClear: true
      });

      if (loggedInUser) {
        GLOBAL_DATA.currentUser = GLOBAL_DATA.users.find(u => u.name === loggedInUser);
        // 設定值並通知 Select2 更新 UI (使用 change.select2 避免觸發一般 change 事件導致重複執行)
        $userSelect.val(loggedInUser).trigger('change.select2');
        // 強制執行關聯選單更新，確保在頁面載入時必定載入個案名單，不依賴事件觸發
        updateCustSelect(loggedInUser);

        // 如果是 Admin，允許選擇其他居服員；否則鎖定
        if (loggedInRole === 'Admin') {
          $userSelect.prop("disabled", false);
        } else {
          $userSelect.prop("disabled", true);
        }
      } else {
        GLOBAL_DATA.currentUser = null;
        $userSelect.prop("disabled", false);
      }
    }

    // --- 需求 5：更新 Cust 選單 ---
    function updateCustSelect(userName) {
      const $custSelect = $("#queryCustN");
      const $otherSelect = $("#queryCustNOther");

      // 修正：重新填充下拉選單前，先銷毀舊的 Select2 實例，避免重整頁面時因快取導致無法選擇
      if ($custSelect.hasClass("select2-hidden-accessible")) {
        $custSelect.select2('destroy');
      }
      if ($otherSelect.hasClass("select2-hidden-accessible")) {
        $otherSelect.select2('destroy');
      }

      // 切換居服員時，重置「其他個案」區塊的狀態
      $("#otherCustRow").hide();
      $otherSelect.removeClass("highlight-select2").prop("disabled", true);

      $custSelect.empty();
      $custSelect.append('<option></option>'); // Placeholder

      $otherSelect.empty();
      $otherSelect.append('<option></option>'); // Placeholder
      $("#querySrId").empty().append('<option value="" disabled selected>請先選擇個案...</option>');

      const userObj = GLOBAL_DATA.users.find(u => u.name === userName);
      let favCusts = [];

      // 確保 Admin 切換居服員時，帶出該居服員的常用個案 (兼容 favCustStr 與 custStr)
      const listStr = userObj ? (userObj.favCustStr || userObj.custStr) : "";
      if (listStr) {
        favCusts = listStr.split(',').map(s => s.trim()).filter(s => s !== "");
      }

      const loginData = JSON.parse(localStorage.getItem('Login'));

      const allCustNames = GLOBAL_DATA.custs.map(c => c.name);

      if (favCusts.length === 0) {
        if (userName) showToast('info', '該居服員未設定常用個案，已載入所有個案');
        allCustNames.sort().forEach(c => {
          $custSelect.append(`<option value="${c}">${c}</option>`);
        });
      } else {
        if (loginData && loginData.Role === 'Admin' && userName && loginData.User !== userName) {
          showToast('info', `已載入 ${userName} 的常用個案`);
        }
        favCusts.forEach(c => {
          $custSelect.append(`<option value="${c}">${c}</option>`);
        });
        $custSelect.append('<option value="其他">其他 (開啟下方清單)</option>');

        const otherCusts = allCustNames.filter(name => !favCusts.includes(name)).sort();
        otherCusts.forEach(c => {
          $otherSelect.append(`<option value="${c}">${c}</option>`);
        });
      }

      // 初始化 Cust Select2
      $custSelect.select2({
        theme: 'bootstrap-5',
        width: '100%',
        placeholder: '請輸入名字搜尋個案...',
        allowClear: true
      });

      // 初始化 Other Cust Select2
      $otherSelect.select2({
        theme: 'bootstrap-5',
        width: '100%',
        placeholder: '搜尋其他個案...',
        allowClear: true
      });
    }

    // --- 需求 6：更新 SR_ID 選單 ---
    function updateSrIdSelect(custName) {
      if (!custName) return;

      const $srSelect = $("#querySrId");
      $srSelect.empty().append('<option value="" disabled selected>請選擇服務編碼...</option>');

      const custObj = GLOBAL_DATA.custs.find(c => c.name === custName);
      let favCodes = [];

      if (custObj && custObj.ltcCodeStr) {
        favCodes = custObj.ltcCodeStr.split(',').map(s => s.trim()).filter(s => s !== "");
      }

      const favCodesSet = GLOBAL_DATA.ltcCodes.filter(srcode => favCodes.includes(srcode.id)).sort();
      const otherCodes = GLOBAL_DATA.ltcCodes.filter(srcode => !favCodes.includes(srcode.id)).sort();

      favCodesSet.forEach(srcode => {
        $srSelect.append(`<option value="${srcode.id}">${srcode.id}${srcode.cont}</option>`);
      });


      if (otherCodes.length > 0 && favCodes.length > 0) {
        $srSelect.append('<option disabled>──────────</option>');
      }

      otherCodes.forEach(srcode => {
        $srSelect.append(`<option value="${srcode.id}">${srcode.id}${srcode.cont}</option>`);
      });
    }

    // Helper to get column index from srDataHeaders
    function getColIndex(name) {
      return GLOBAL_DATA.srDataHeaders.indexOf(name);
    }

    function validateQuery() {
      if (
        !$("#queryDate").val() ||
        !$("#querySRTimes").val() ||
        !$("#queryUserN").val() ||
        !$("#queryCustN").val() ||
        !$("#queryPType").val() ||
        !$("#querySrId").val()
      ) {
        Swal.fire("提示", "請填齊：日期、個案、居服員與編碼", "warning");
        return false;
      }
      return true;
    }

    async function handleAction(type) {
      let selectedCust = $("#queryCustN").val();
      if (selectedCust === "其他") {
        selectedCust = $("#queryCustNOther").val();
        if (!selectedCust) {
          $("#loadingSpin").hide();
          Swal.fire("提示", "請選擇其他個案姓名", "warning");
          return false; // 回傳 false 表示驗證失敗
        }
      }

      if (!validateQuery()) {
        $("#loadingSpin").hide();
        return false; // 回傳 false 表示驗證失敗
      }

      const formObj = getFormObject(selectedCust);      // 印出 formObj 以供偵錯
      // console.log("formObj for debugging:", formObj);


      if (type === 'query') {

        // Client-side search
        const idx = {
          date: getColIndex('Date'),
          srTimes: getColIndex('SRTimes'),
          custN: getColIndex('CUST_N'),
          userN: getColIndex('USER_N'),
          payType: getColIndex('Pay_Type'),
          srId: getColIndex('SR_ID')
        };
        // 印出 srData 以供偵錯
        // console.log("GLOBAL_DATA.srData for debugging:", GLOBAL_DATA.srData);

        const foundRow = GLOBAL_DATA.srData.find(row =>
          String(row[idx.date]).trim() === formObj.date.trim() &&
          String(row[idx.srTimes]).trim() === formObj.SRTimes.trim() &&
          String(row[idx.custN]).trim() === formObj.custName.trim() &&
          String(row[idx.userN]).trim() === formObj.userName.trim() &&
          String(row[idx.payType]).trim() === formObj.payType.trim() &&
          String(row[idx.srId]).trim() === formObj.srId.trim()
        );

        if (foundRow) {
          $("#loadingSpin").hide();
          triggerVibrate('success'); // 查詢成功震動
          const data = {
            srRec: foundRow[getColIndex('SR_REC')],
            loc: foundRow[getColIndex('LOC')],
            mood: foundRow[getColIndex('MOOD')],
            spcons: foundRow[getColIndex('SPCONS')]
          };
          fillQueryLabel(formObj);
          fillDetail(data);
          $("#inputSrRec").focus();
          $("#detailSection").show();
          $("#searchSection").hide();
          $("#btnAdd").hide();
          $("#btnUpdate").show();
          return true; // 查詢成功，切換畫面，保持按鈕 disabled 狀態(雖然它已被隱藏)
        } else {
          let exSPCONS = await getSPCons(formObj);
          $("#loadingSpin").hide();
          triggerVibrate('error'); // 查無資料震動
          Swal.fire({
            title: "查無此紀錄，是否要新增一筆紀錄並開始編輯？",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            confirmButtonText: "是，新增紀錄",
            cancelButtonText: "否",
          }).then((result) => {
            if (result.isConfirmed) {
              fillQueryLabel(formObj);
              setTimeout(function () { $("#inputSrRec").val("").trigger('input').focus(); }, 50);
              $("#inputLoc").val(exSPCONS.loc || "清醒");
              $("#inputMood").val(exSPCONS.mood || "穩定");
              $("#inputSpcons").val(exSPCONS.spcons || "無");
              $("#detailSection").show();
              $("#searchSection").hide();
              $("#btnUpdate").hide();
              $("#btnAdd").show();
            }
          });
          return false; // 查詢未果(或取消新增)，回傳 false 以便重新啟用查詢按鈕
        }
        return false; // 確保路徑完整
      }

      // --- Client-side data manipulation ---
      const rowData = [
        formObj.date, formObj.SRTimes, formObj.custName, formObj.userName,
        formObj.payType, formObj.srId, formObj.srRec, formObj.loc,
        formObj.mood, formObj.spcons
      ];

      if (type === 'add') {
        GLOBAL_DATA.srData.push(rowData);
        updateSessionCache();
      } else if (type === 'update') {
        const idx = { date: getColIndex('Date'), srTimes: getColIndex('SRTimes'), custN: getColIndex('CUST_N'), userN: getColIndex('USER_N'), payType: getColIndex('Pay_Type'), srId: getColIndex('SR_ID') };
        const rowIndex = GLOBAL_DATA.srData.findIndex(row =>
          String(row[idx.date]).trim() === formObj.date.trim() &&
          String(row[idx.srTimes]).trim() === formObj.SRTimes.trim() &&
          String(row[idx.custN]).trim() === formObj.custName.trim() &&
          String(row[idx.userN]).trim() === formObj.userName.trim() &&
          String(row[idx.payType]).trim() === formObj.payType.trim() &&
          String(row[idx.srId]).trim() === formObj.srId.trim()
        );
        if (rowIndex > -1) {
          GLOBAL_DATA.srData[rowIndex] = rowData;
        } else {
          GLOBAL_DATA.srData.push(rowData);
        }
        updateSessionCache();
      }

      // --- Asynchronous server update (Fire and Forget) ---
      google.script.run
        .withFailureHandler(function (err) {
          console.error("Background sync failed:", err.message);
          showToast('error', '背景同步失敗');
        })
        .processSR01Data(formObj, type);

      // --- Immediate UI Feedback ---
      $("#loadingSpin").hide();
      triggerVibrate('success'); // 新增/更新成功震動

      Swal.fire({
        icon: "success",
        title: "成功",
        text: type === 'add' ? '紀錄已新增' : '紀錄已更新',
        timer: 1500,
        showConfirmButton: false,
      }).then(() => {
        backToSearch();
        // 操作完成並導回搜尋頁後，重新啟用按鈕以供下次使用
        $('#btnAdd, #btnUpdate').prop('disabled', false);
      });

      return true; // 動作成功執行
    }

    function getFormObject(selectedCust) {
      return {
        date: $("#queryDate").val(),
        SRTimes: $("#querySRTimes").val(),
        userName: $("#queryUserN").val(),
        custName: selectedCust,
        payType: $("#queryPType").val(),
        srId: $("#querySrId").val(),
        srRec: $("#inputSrRec").val(),
        loc: $("#inputLoc").val(),
        mood: $("#inputMood").val(),
        spcons: $("#inputSpcons").val(),
        userTel: ""
      };
    }


    function backToSearch() {
      // 1. 優先重置按鈕狀態 (在顯示之前執行，確保屬性已移除)
      // 同時移除 disabled 屬性與 Bootstrap 的 disabled 樣式類別
      $('#btnQuery, .container button').prop('disabled', false).removeAttr('disabled').removeClass('disabled');

      // 2. 切換區塊顯示
      $("#detailSection").hide();
      $("#searchSection").show();

      // 3. 雙重保險：稍微延遲後再次強制啟用 (針對部分頑強的 Android 瀏覽器快取)
      setTimeout(function() {
        $('#btnQuery').prop('disabled', false).removeAttr('disabled');
      }, 100);
    }

    function updateSessionCache() {
      // 重組資料結構以符合 initSuccess 的預期 (將 Header 放回陣列第一筆)
      const dataToCache = {
        users: GLOBAL_DATA.users,
        custs: GLOBAL_DATA.custs,
        ltcCodes: GLOBAL_DATA.ltcCodes,
        srData: [GLOBAL_DATA.srDataHeaders, ...GLOBAL_DATA.srData]
      };
      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(dataToCache));
      } catch (e) {
        console.error("更新 sessionStorage 失敗 (可能容量不足):", e);
      }
    }

    function triggerVibrate(mode) {
      // 檢查瀏覽器是否支援震動 API
      if (navigator.vibrate) {
        if (mode === 'success') {
          navigator.vibrate(100); // 成功：短震動
        } else if (mode === 'error') {
          navigator.vibrate([100, 50, 100]); // 失敗/警告：雙短震動
        }
      }
    }

    function fillQueryLabel(formObj) {
      const labelText = `${formObj.date}| ${formObj.SRTimes} | ${formObj.userName} | ${formObj.custName} | ${formObj.payType} | ${formObj.srId}`;
      $('#labQuery').text(labelText);
    }

    function fillDetail(data) {
      $('#inputSrRec').val(data.srRec || "").trigger('input');
      $('#inputLoc').val(data.loc || "清醒");
      $('#inputMood').val(data.mood || "穩定");
      $('#inputSpcons').val(data.spcons || "無");
    }

    async function handleClipboard(action, targetId) {
      const $el = $(targetId);
      const text = $el.val();
      const srid = GLOBAL_DATA.ltcCodes.find(x => String(x.id) === $('#querySrId').val().trim());
      try {
        if (action === 'cut') {
          if (!text) return showToast('info', '沒有內容可以剪下');
          await navigator.clipboard.writeText(text);
          $el.val("").trigger('input');
          showToast('success', '已剪下');
        } else if (action === 'copy') {
          if (!text) return showToast('info', '內容為空，無法複製');
          await navigator.clipboard.writeText(text);
          showToast('success', '已複製');
        } else if (action === 'paste') {
          const clipboardText = await navigator.clipboard.readText();
          if (!clipboardText) return showToast('info', '剪貼簿中沒有內容');
          const currentVal = $el.val();
          $el.val(currentVal + clipboardText).trigger('input');
          showToast('success', '已貼上');
        } else if (action === 'addAI') {
          const currentVal = $el.val();
          $el.val(`${currentVal}\n修飾以上句子，符合長照 ${srid.id}${srid.cont} 電子服務紀錄單的格式，50個字以內，內容不包含長照編碼。`).trigger('input');
          showToast('success', '已加入AI助手');
        }
      } catch (err) {
        console.error('剪貼簿操作失敗:', err);
        Swal.fire({ icon: 'error', title: '操作失敗', text: '請確保使用 HTTPS 並授權瀏覽器存取剪貼簿。' });
      }
    }

    function showToast(icon, title) {
      triggerVibrate(icon === 'success' ? 'success' : 'error'); // Toast 提示時震動
      Swal.fire({
        icon: icon,
        title: title,
        timer: 1000,
        showConfirmButton: false,
        toast: true,
        position: 'top-end'
      });
    }

    function getSPCons(formObj) {
      return new Promise((resolve) => {
        google.script.run
          .withSuccessHandler(function (res) {
            // 修正：增加對回傳資料結構的相容性檢查 (支援 {data: ...} 或直接回傳物件)
            let resultData = (res && res.data) ? res.data : res;

            // 設定預設值
            const defaults = { loc: "清醒", mood: "穩定", spcons: "無" };

            if (resultData) {
              resolve({
                loc: resultData.loc || defaults.loc,
                mood: resultData.mood || defaults.mood,
                spcons: resultData.spcons || defaults.spcons
              });
            } else {
              resolve(defaults);
            }
          })
          .withFailureHandler(function (err) {
            console.error("getSPCons backend error:", err);
            resolve({ loc: "清醒", mood: "穩定", spcons: "無" });
          })
          .getSPCONS(formObj);
      });
    }
  </script>
</body>
