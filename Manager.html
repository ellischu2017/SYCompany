<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>管理員管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    .container {
      max-width: 600px;
      margin-top: 20px;
    }

    .hidden-section {
      display: none;
    }

    .mana-label {
      font-weight: bold;
      font-size: 1.2rem;
      color: #198754;
      padding: 5px 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-success sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-success" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">管理員管理系統</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5>系統導航</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container">
    <div id="searchSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">管理員選擇</h5>
        <div class="mb-3">
          <select class="form-select" id="selectManaName">
            <option value="" disabled selected>載入中...</option>
          </select>
        </div>
        <div class="d-flex gap-3">
          <button class="btn btn-outline-primary flex-grow-1" id="btnQuery"><i class="fas fa-edit"></i> 修改</button>
          <button class="btn btn-outline-success flex-grow-1" id="btnAddInit"><i class="fas fa-plus"></i> 新增</button>
          <button class="btn btn-outline-danger flex-grow-1" id="btnDeleteFromSearch"><i class="fas fa-trash"></i> 刪除</button>
        </div>
      </div>
    </div>

    <div id="detailSection" class="card shadow-sm hidden-section">
      <div class="card-body">
        <form id="ManaForm">
          <input type="hidden" id="formMode" value="update">
          <div class="mb-3">
            <label class="form-label">管理員姓名 (Mana_N)</label>
            <div id="displayManaName" class="mana-label"></div>
            <input type="hidden" id="inputManaName">
          </div>
          <div class="mb-3">
            <label class="form-label">Email (Mana_Email)</label>
            <input type="email" class="form-control" id="inputManaEmail">
          </div>
          <div class="mb-3">
            <label class="form-label">電話 (Mana_Tel)</label>
            <input type="text" class="form-control" id="inputManaTel" placeholder="0900000000">
          </div>
          <div class="d-flex gap-3 mt-4">
            <button type="button" class="btn btn-success flex-grow-1" id="btnSave"><i class="fas fa-save"></i> 更新資料</button>
            <button type="button" class="btn btn-danger flex-grow-1" id="btnDelete"><i class="fas fa-trash"></i> 刪除</button>
            <button type="button" class="btn btn-secondary flex-grow-1" id="btnBack" onclick="backToSearch()">返回搜尋</button>
          </div>
        </form>
      </div>
    </div>
    <div class="container mt-2 text-end">
      <small class="text-muted">
        <i class="fas fa-user-circle"></i> 當前管理員：
        <span id="currentUserDisplay"></span>
      </small>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    $(document).ready(function () {
      showPageLoading('載入名單', '正在讀取管理員資訊...');
      // 顯示當前使用者
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);
      loadInitialData();

      $('#btnQuery').click(function () {
        const name = $('#selectManaName').val();
        if (!name) return Swal.fire('提示', '請選擇管理員', 'warning');

        const managers = JSON.parse(sessionStorage.getItem('managerData')) || [];
        const manager = managers.find(m => m.Mana_N === name);

        if (manager) {
          $('#displayManaName').text(manager.Mana_N);
          $('#inputManaName').val(manager.Mana_N);
          $('#inputManaEmail').val(manager.Mana_Email);
          $('#inputManaTel').val(manager.Mana_Tel);
          switchToDetailMode('update');
        } else {
          Swal.fire('錯誤', '找不到該管理員資料，請重新整理頁面', 'error');
        }
      });

      $('#btnAddInit').click(function () {
        Swal.fire({
          title: '輸入新管理員姓名',
          input: 'text',
          showCancelButton: true,
          inputValidator: (value) => {
            if (!value) return '請輸入姓名';
          }
        }).then((result) => {
          if (result.isConfirmed && result.value) {
            const managers = JSON.parse(sessionStorage.getItem('managerData')) || [];
            if (managers.some(m => m.Mana_N === result.value)) {
              Swal.fire('錯誤', '該管理員姓名已存在', 'error');
              return;
            }

            $('#ManaForm')[0].reset();
            $('#displayManaName').text(result.value);
            $('#inputManaName').val(result.value);
            switchToDetailMode('add');
          }
        });
      });

      $('#btnSave').click(function () {
        const mode = $('#formMode').val();
        const data = {
          manaName: $('#inputManaName').val(),
          manaEmail: $('#inputManaEmail').val(),
          manaTel: $('#inputManaTel').val()
        };

        if (!data.manaName) return Swal.fire('提示', '姓名不能為空', 'warning');

        // 立即更新 UI & Session
        updateSessionAndUI(mode, data);

        // 背景同步
        const action = (mode === 'add') ? 'addManaData' : 'updateManaData';
        google.script.run.withSuccessHandler(function (res) {
          if (!res.success) {
            Swal.fire('同步失敗', res.message + ' 請重新整理頁面。', 'error');
          } else {
            console.log('背景同步成功:', res.message);
          }
        }).withFailureHandler(function (err) {
          Swal.fire('同步錯誤', err.message, 'error');
        })[action](data);
      });

      $('#btnDelete').click(function () {
        const name = $('#inputManaName').val();
        Swal.fire({
          title: '確定刪除?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33'
        }).then((result) => {
          if (result.isConfirmed) {
            // 立即更新 UI & Session
            deleteFromSessionAndUI(name);

            // 背景同步
            google.script.run.withSuccessHandler(function (res) {
              if (!res.success) {
                Swal.fire('同步失敗', res.message, 'error');
              } else {
                console.log('背景刪除成功');
              }
            }).withFailureHandler(function (err) {
              Swal.fire('同步錯誤', err.message, 'error');
            }).deleteManaData(name);
          }
        });
      });

      $('#btnDeleteFromSearch').click(function () {
        const name = $('#selectManaName').val();
        if (!name) return Swal.fire('提示', '請選擇要刪除的管理員', 'warning');

        Swal.fire({
          title: '確定要刪除此管理員?',
          text: `您確定要刪除「${name}」嗎？此動作無法復原！`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: '是的，刪除！',
          cancelButtonText: '取消'
        }).then((result) => {
          if (result.isConfirmed) {
            deleteFromSessionAndUI(name);

            google.script.run.withSuccessHandler(function (res) {
              if (!res.success) {
                Swal.fire('同步失敗', res.message, 'error');
              } else {
                console.log('背景刪除成功');
              }
            }).withFailureHandler(function (err) {
              Swal.fire('同步錯誤', err.message, 'error');
            }).deleteManaData(name);
          }
        });
      });
    });

    function loadInitialData() {
      google.script.run.withSuccessHandler(function (data) {
        sessionStorage.setItem('managerData', JSON.stringify(data));
        populateDropdown();
        Swal.close();
      }).withFailureHandler(function (err) {
        Swal.close();
        Swal.fire('載入失敗', err.message, 'error');
      }).getAllManagerData();
    }

    function populateDropdown() {
      const managers = JSON.parse(sessionStorage.getItem('managerData')) || [];
      const select = $('#selectManaName');
      select.empty().append('<option value="" disabled selected>請選擇管理員...</option>');
      managers.forEach(m => select.append(`<option value="${m.Mana_N}">${m.Mana_N}</option>`));
    }

    function updateSessionAndUI(mode, data) {
      let managers = JSON.parse(sessionStorage.getItem('managerData')) || [];

      if (mode === 'add') {
        managers.push({ Mana_N: data.manaName, Mana_Email: data.manaEmail, Mana_Tel: data.manaTel });
        managers.sort((a, b) => a.Mana_N.localeCompare(b.Mana_N));
      } else {
        const idx = managers.findIndex(m => m.Mana_N === data.manaName);
        if (idx !== -1) {
          managers[idx].Mana_Email = data.manaEmail;
          managers[idx].Mana_Tel = data.manaTel;
        }
      }

      sessionStorage.setItem('managerData', JSON.stringify(managers));

      Swal.fire({ icon: 'success', title: '成功', text: (mode === 'add' ? '新增' : '更新') + '成功 (背景同步中)', timer: 1500, showConfirmButton: false });

      backToSearch();
    }

    function deleteFromSessionAndUI(name) {
      let managers = JSON.parse(sessionStorage.getItem('managerData')) || [];
      managers = managers.filter(m => m.Mana_N !== name);
      sessionStorage.setItem('managerData', JSON.stringify(managers));

      Swal.fire({ icon: 'success', title: '已刪除', text: '資料已刪除 (背景同步中)', timer: 1500, showConfirmButton: false });

      backToSearch();
    }

    function switchToDetailMode(mode) {
      $('#searchSection').hide();
      $('#detailSection').show();
      $('#formMode').val(mode);
      $('#btnSave').text(mode === 'add' ? '新增資料' : '更新資料');
      if (mode === 'add') $('#btnDelete').hide(); else $('#btnDelete').show();
    }

    function backToSearch() {
      $('#detailSection').hide();
      $('#searchSection').show();
      populateDropdown();
    }


  </script>
</body>
<?!= includeFooter(); ?>

</html>
