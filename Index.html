    <script>
      // 頁面加載完成後的初始化邏輯
      $(document).ready(function () {
        // 1. 立刻顯示與前一頁相同的載入視窗 (因為 Footer 在最下方，若報錯代表 Footer 還沒載入，改用 native Swal)
        if (typeof showPageLoading === 'function') {
          showPageLoading('系統初始化', '正在驗證身分並準備選單...');
        } else {
          Swal.fire({ title: '載入中', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        }

        console.log("舒漾長照系統 - Index 頁面載入完成");
        // 檢查如果沒有 userEmail (代表繞過後端載入，雖然機率低)
        checkLocalStorageAuth();
      });

      function checkLocalStorageAuth() {
        let loginData;
        try {
          // 優先檢查 sessionStorage，再檢查 localStorage (與 Auth.html 邏輯同步，避免無窮迴圈)
          loginData = JSON.parse(sessionStorage.getItem('Login'));
          if (!loginData) {
            loginData = JSON.parse(localStorage.getItem('Login'));
          }
        } catch (e) {
          loginData = null;
        }

        // 檢查：若 localStorage 無有效登入資料，則拒絕存取
        if (!loginData || !loginData.User || !loginData.Role) {
          // 如果 buildUrl 還沒載入（雖然機率低），提供備援邏輯
          if (typeof buildUrl === 'function') {
            window.top.location.href = buildUrl('Auth', 'error=access_denied');
          } else {
            const baseUrl = "<?!= getScriptUrl() ?>";
            const sep = baseUrl.indexOf('?') !== -1 ? '&' : '?';
            window.top.location.href = baseUrl + sep + "page=Auth&error=access_denied";
          }
        } else if (loginData && loginData.Role) {
          // 如果有 localStorage 登入資訊，但沒有 Google 登入資訊，則顯示使用者名稱
          if (loginData.User) {
            $('#currentUserName').text(loginData.User);
          }
          // 驗證通過後才隱藏 Loading，避免畫面閃爍或在跳轉前顯示內容
          Swal.close();
        }
      }

    </script>
