<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>舒漾資料轉換系統</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    .main-container {
      max-width: 800px;
      margin: 20px auto;
      padding: 15px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .form-label {
      font-weight: bold;
      color: #333;
    }

    #divResult {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.9rem;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      padding: 10px;
      background-color: #f8f9fa;
      display: none;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-secondary sticky-top">
    <div class="container-fluid">
      <button class="btn btn-light text-secondary" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar">
        <i class="fas fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1 mx-auto">舒漾資料轉換系統</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">系統導航</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <?!= includeNav(); ?>
    </div>
  </div>

  <div class="container main-container">
    <form id="transferForm">
      <div class="mb-3">
        <label for="selCustName" class="form-label">選擇案主 (Customer Name)</label>
        <select class="form-select" id="selCustName" required>
          <option value="" selected disabled>資料讀取中...</option>
        </select>
      </div>
     
      <div class="mb-3">
        <label for="inputFormUrl" class="form-label">舊表單網址 (Form_Url)</label>
        <input type="text" class="form-control" id="inputFormUrl" placeholder="請輸入舊表單網址">
      </div>

      <div class="form-group mb-4">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="chkUpdate" style="cursor: pointer" checked />
          <label class="form-check-label" for="chkUpdate">
            僅更新 (Update Only) - <small class="text-muted">勾選：只轉換上次更新後的資料；未勾選：轉換該日期前的歷史資料</small>
          </label>
        </div>
      </div>

      <div class="d-grid gap-2">
        <button type="button" class="btn btn-secondary btn-lg" id="btnTransfer">
          <i class="fas fa-sync-alt me-2"></i>開始轉換 (Start Transfer)
        </button>
      </div>
    </form>
    <div id="divResult"></div>
    <div class="container mt-2 text-end">
      <small class="text-muted">當前管理員：<span id="currentUserDisplay"></span></small>
    </div>
  </div>

  <?!= includeFooter() ?>
  <script>
    $(document).ready(function () {
      const loginData = JSON.parse(localStorage.getItem('Login'));
      if (loginData && loginData.User) $('#currentUserDisplay').text(loginData.User);
      loadCustomerNames();
      $('#btnTransfer').on('click', runTransfer);
    });

    function loadCustomerNames() {
      // 使用 Footer.html 定義的全域動畫
      showPageLoading('系統載入中', '正在獲取案主名單...');

      google.script.run
        .withSuccessHandler(function (names) {
          Swal.close();
          var select = $('#selCustName').empty().append('<option value="" selected disabled>請選擇案主...</option>');
          select.append('<option value="all" style="font-weight:bold; color:blue;">全部更新 (Update All)</option>');
          if (names && names.length > 0) {
            const excepname = ["Raw Responses", "表單回覆 171"];
            names.filter(n => !excepname.includes(n)).forEach(n => select.append($('<option></option>').val(n).text(n)));
          }
        })
        .withFailureHandler(function (err) {
          Swal.close();
          Swal.fire('讀取錯誤', '無法載入案主名單: ' + err.message, 'error');
        })
        .getRawResponseSheetNames();
    }

    function runTransfer() {
      const custName = $('#selCustName').val();
      const isUpdateOnly = $('#chkUpdate').is(':checked');
      if (!custName) return Swal.fire('提示', '請先選擇一位案主', 'warning');

      Swal.fire({
        title: '資料轉換中',
        html: `正在處理：<b>${custName === 'all' ? '全部案主' : custName}</b><br>模式：${isUpdateOnly ? '僅更新新資料' : '處理歷史資料'}`,
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      google.script.run
        .withSuccessHandler(function (result) {
          Swal.close();
          if (result.success) {
            Swal.fire({ icon: 'success', title: '轉換完成', text: `成功寫入 ${result.count} 筆紀錄。` });
            $('#divResult').html(`<strong>處理結果 (${new Date().toLocaleTimeString()}):</strong><br>` + result.log.replace(/\n/g, '<br>')).show();
          } else {
            Swal.fire('轉換失敗', result.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          Swal.close();
          Swal.fire('系統錯誤', '執行超時或發生錯誤：' + err.message, 'error');
        })
        .processTransferData(custName, isUpdateOnly);
    }
  </script>
</body>
</html>
